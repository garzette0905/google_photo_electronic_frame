<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16213a"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8ab4ff"/>
      <stop offset="1" stop-color="#5b8def"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)"/>

  <!-- 서로 이어진 세 장의 사진: "기억 조각 이어주기" 모티프 -->
  <g stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.85">
    <line x1="19" y1="22" x2="45" y2="22"/>
    <line x1="19" y1="22" x2="32" y2="42"/>
    <line x1="45" y1="22" x2="32" y2="42"/>
  </g>

  <rect x="13" y="16" width="12" height="12" rx="3" fill="#2c3e63"/>
  <rect x="39" y="16" width="12" height="12" rx="3" fill="#2c3e63"/>
  <rect x="26" y="36" width="12" height="12" rx="3" fill="url(#accent)"/>

  <circle cx="19" cy="22" r="2.6" fill="#eef4ff"/>
  <circle cx="45" cy="22" r="2.6" fill="#eef4ff"/>
  <circle cx="32" cy="42" r="2.6" fill="#eef4ff"/>
</svg>
