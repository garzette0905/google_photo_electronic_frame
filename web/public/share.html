<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>기억 조각 이어주기</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="/styles.css" />
<style>
  /* 공유 보기 전용: 사진이 화면 전체를 채우는 단순 슬라이드쇼 */
  .share-view { position: fixed; inset: 0; background: #000; overflow: hidden; }
  .share-view .photo-layer { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: opacity 1.4s ease-in-out; }
  .share-view .photo-layer.active { opacity: 1; }
  .share-caption {
    position: absolute; right: 20px; bottom: 68px; z-index: 5; pointer-events: none; text-align: right;
    color: rgba(255,255,255,0.9); font-size: 13px; line-height: 1.5;
    text-shadow: 0 1px 4px rgba(0,0,0,0.85);
  }
  #btn-music .icon-pause { display: none; }
  #btn-music.playing .icon-play { display: none; }
  #btn-music.playing .icon-pause { display: block; }
  .share-loading, .share-error {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 15px; text-align: center; padding: 24px;
  }
  .tap-hint {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    z-index: 8; background: rgba(0,0,0,0.35); color: #fff; font-size: 15px; cursor: pointer;
  }
  .tap-hint span { background: rgba(0,0,0,0.5); padding: 12px 22px; border-radius: 24px; backdrop-filter: blur(4px); }
  .share-view .icon-btn { width: 44px; height: 44px; opacity: 0.7; }
  .share-actions { position: absolute; left: 16px; bottom: 16px; z-index: 6; display: flex; gap: 8px; }
  .share-actions .fullscreen-btn { position: static; }
</style>
</head>
<body>
  <div class="share-view">
    <img class="photo-layer" id="photo-a" />
    <img class="photo-layer" id="photo-b" />

    <div id="share-loading" class="share-loading">사진을 불러오는 중...</div>
    <div id="share-error" class="share-error hidden"></div>

    <div class="share-actions">
      <button id="btn-fullscreen" class="icon-btn fullscreen-btn" title="전체 화면 (Esc로 복귀)">
        <svg class="icon-expand" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
          <path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
        </svg>
        <svg class="icon-shrink" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/>
          <path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>
        </svg>
      </button>

      <button id="btn-home" class="icon-btn" title="메인 홈으로 이동">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 11.5 12 4l9 7.5"/>
          <path d="M5.5 9.5V19a1 1 0 0 0 1 1H9a1 1 0 0 0 1-1v-4h4v4a1 1 0 0 0 1 1h2.5a1 1 0 0 0 1-1V9.5"/>
        </svg>
      </button>

      <button id="btn-music" class="icon-btn" title="배경음악 재생/정지" style="display:none;">
        <svg class="icon-play" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <polygon points="7,5 19,12 7,19"/>
        </svg>
        <svg class="icon-pause" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>
        </svg>
      </button>
    </div>

    <div id="share-caption" class="share-caption"></div>

    <div id="tap-hint" class="tap-hint hidden"><span>탭하여 음악과 함께 시작 ▶</span></div>
    <div class="yt-host"><div id="yt-player"></div></div>
  </div>

  <script src="/share.js"></script>
</body>
</html>
